<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="vendor/katex.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafaf8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      gap: 2rem;
      padding: 2rem 1rem;
    }

    #screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .title {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #004170, #ed1c8f, #da291c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #6b7280;
    }

    .direction {
      font-size: 1rem;
      color: #6b7280;
      letter-spacing: 0.05em;
    }

    #word {
      font-size: 5rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      padding: 0 1rem;
    }

    #answer-row { display: flex; justify-content: center; }

    #answer {
      font-family: inherit;
      font-size: 3rem;
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 4px solid #333;
      outline: none;
      text-align: center;
      color: #004170;
      padding: 0 0.5rem;
      min-width: 12rem;
      transition: border-color 0.15s;
    }

    #answer.correct { border-color: #22c55e; color: #15803d; }

    #answer.skipped { border-color: #9ca3af; color: #6b7280; }

    #answer.wrong {
      border-color: #da291c;
      color: #da291c;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
    .choices-col { flex-direction: column; align-items: stretch; min-width: 18rem; }

    .lesson-row { display: flex; gap: 0.5rem; }
    .lesson-row > button:first-child { flex: 1; }

    button.review {
      background: transparent;
      color: #004170;
      border: 2px solid #004170;
      padding: 0.4rem 1rem;
      font-size: 1rem;
    }
    button.review:hover { background: #004170; color: white; }

    .review-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: min(90vw, 40rem);
      width: 100%;
    }
    .review-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: baseline;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #e5e7eb;
      font-size: 1.1rem;
    }
    .review-key { text-align: right; color: #004170; font-weight: 600; }
    .review-sep { color: #9ca3af; }
    .review-value { text-align: left; color: #ed1c8f; font-weight: 600; }
    .review-listen {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0.25rem;
      margin-left: 0.25rem;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .review-listen:hover { opacity: 1; }
    .review-listen:disabled { opacity: 0.3; cursor: default; }
    .card-note {
      grid-column: 1 / -1;
      font-size: 0.9rem;
      color: #6b7280;
      font-style: italic;
      margin-top: 0.25rem;
    }
    .card-note p { margin: 0; }
    .lesson-notes {
      max-width: min(90vw, 40rem);
      width: 100%;
      font-size: 1rem;
      color: #374151;
      background: #f3f4f6;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      border-left: 4px solid #004170;
    }
    .lesson-notes p { margin: 0.5rem 0; }
    .lesson-notes p:first-child { margin-top: 0; }
    .lesson-notes p:last-child { margin-bottom: 0; }
    .lesson-notes code { background: #e5e7eb; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.9em; }

    #controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button {
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #004170;
      color: white;
      transition: background 0.15s;
      user-select: none;
      -webkit-user-select: none;
    }

    button:hover { background: #002a4d; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }

    button.back {
      background: transparent;
      color: #6b7280;
      font-size: 0.95rem;
      padding: 0.3rem 0.8rem;
    }
    button.back:hover { background: #f3f4f6; }

    button.skip { background: #6b7280; }
    button.skip:hover { background: #4b5563; }

    #listen { background: #ed1c8f; }
    #listen:hover { background: #c2137a; }
    #listen:disabled { background: #f5a9b8; }

    #score {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      font-size: 1.2rem;
      color: #6b7280;
    }

    #progress {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      max-width: min(90vw, 40rem);
    }

    .dot {
      width: 0.75rem;
      height: 0.75rem;
      border-radius: 50%;
      background: #d1d5db;
      transition: background 0.2s, transform 0.2s;
    }
    .dot.correct { background: #22c55e; }
    .dot.wrong   { background: #ef4444; }
    .dot.current { background: #3b82f6; transform: scale(1.3); }
    .dot.current.wrong { background: #ef4444; }

    .editor-link {
      position: fixed;
      bottom: 0.75rem;
      right: 1rem;
      font-size: 0.85rem;
      color: #9ca3af;
      text-decoration: none;
    }
    .editor-link:hover { color: #004170; }
  </style>
</head>
<body>
  <div id="screen"></div>
  <div id="score"></div>
  <div id="progress"></div>
  <a href="editor/" class="editor-link">Éditeur</a>

  <script src="vendor/katex.min.js"></script>
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/marked-katex.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
